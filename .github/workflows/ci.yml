name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          find . -name "*.sh" -print0 | xargs -0 shellcheck

  validate-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check for unreplaced tokens in non-template files
        run: |
          found=$(grep -rl '\[\[' . --exclude-dir=.git \
            --exclude='_README.md' \
            --exclude='index.html' \
            --exclude='overview.md' \
            --exclude='_sidebar.md' \
            --exclude='_navbar.md' \
            --exclude='copilot-instructions.md' \
            --exclude='AGENTS.md' \
            --exclude='CONTRIBUTING.md' \
            --exclude='PLAN.md' \
            --exclude='skill.json' \
            --exclude='devcontainer.json' \
            --exclude='pull_request_template.md' \
            2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "Unreplaced tokens found in non-template files:"
            echo "$found"
            exit 1
          fi
          echo "Token check passed."
